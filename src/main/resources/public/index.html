<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>File Service</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --text: #111111;
            --muted: #666666;
            --border: #dddddd;
            --surface: #f6f6f6;
            --link: #0b66c3;
            --btn-bg: #f2f2f2;
            --btn-border: #cccccc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1115;
                --text: #e6e6e6;
                --muted: #a0a0a0;
                --border: #2a2f3a;
                --surface: #1b202a;
                --link: #7ab4ff;
                --btn-bg: #1b202a;
                --btn-border: #2a2f3a;
            }
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 24px auto;
            padding: 0 12px;
            background: var(--bg);
            color: var(--text);
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        a {
            color: var(--link);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        th, td {
            border-bottom: 1px solid var(--border);
            padding: 8px;
            text-align: left;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        button {
            cursor: pointer;
            background: var(--btn-bg);
            color: var(--text);
            border: 1px solid var(--btn-border);
            border-radius: 8px;
            padding: 6px 10px;
        }

        input[type="file"] {
            color: var(--text);
        }

        code {
            background: var(--surface);
            padding: 2px 6px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<h1>File Service</h1>

<div class="row">
    <input id="file" type="file"/>
    <button id="upload">Upload</button>
    <button id="refresh">Refresh list</button>
</div>

<div id="msg" style="margin-top:12px;"></div>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Size</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    const msg = (t) => document.getElementById("msg").textContent = t;

    async function refresh() {
        const res = await fetch("./plugins");
        const files = await res.json();
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        for (const f of files) {
            const tr = document.createElement("tr");

            const tdName = document.createElement("td");
            const a = document.createElement("a");
            a.href = "./plugins/" + encodeURIComponent(f);
            a.textContent = f;
            tdName.appendChild(a);

            const tdSize = document.createElement("td");
            tdSize.textContent = f;

            const tdAct = document.createElement("td");
            const del = document.createElement("button");
            del.textContent = "Delete";
            del.onclick = async () => {
                const r = await fetch("./plugins/" + encodeURIComponent(f), {method: "DELETE"});
                if (r.status === 204) msg("Deleted " + f);
                else msg("Delete failed: " + (await r.text()));
                refresh();
            };
            tdAct.appendChild(del);

            tr.appendChild(tdName);
            tr.appendChild(tdSize);
            tr.appendChild(tdAct);
            tbody.appendChild(tr);
        }
    }

    document.getElementById("refresh").onclick = refresh;

    document.getElementById("upload").onclick = async () => {
        const input = document.getElementById("file");
        if (!input.files || input.files.length === 0) {
            msg("Choose a file first.");
            return;
        }
        const fd = new FormData();
        fd.append("file", input.files[0]);

        const r = await fetch("./plugins", {method: "POST", body: fd});
        if (r.ok) msg("Uploaded.");
        else msg("Upload failed: " + (await r.text()));
        input.value = "";
        refresh();
    };

    refresh();
</script>
</body>
</html>
